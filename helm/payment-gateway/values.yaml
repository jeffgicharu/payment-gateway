replicaCount: 2
image:
  repository: payment-gateway
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8787
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
database:
  url: "jdbc:postgresql://postgres:5432/paymentdb"
redis:
  host: "redis"
  enabled: true
prometheus:
  enabled: true
  path: /actuator/prometheus
