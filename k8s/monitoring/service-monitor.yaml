apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payment-gateway
  labels:
    app: payment-gateway
    release: prometheus
spec:
  selector:
    matchLabels:
      app: payment-gateway
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
  namespaceSelector:
    matchNames:
      - default
