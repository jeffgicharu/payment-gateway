apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: payment-gateway-alerts
  labels:
    release: prometheus
spec:
  groups:
    - name: payment-gateway.rules
      rules:
        - alert: HighErrorRate
          expr: rate(http_server_requests_seconds_count{application="payment-gateway",status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on payment-gateway"
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{application="payment-gateway"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 latency above 2s on payment-gateway"
        - alert: ServiceDown
          expr: up{job="payment-gateway"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "payment-gateway is down"
